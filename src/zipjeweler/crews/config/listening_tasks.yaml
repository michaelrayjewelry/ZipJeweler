qualify_leads:
  description: >
    Take ALL discovered posts from all platforms and score each one.

    Scoring criteria (weights from config):
    - Pain-point relevance (40%): How strongly does this post signal a problem ZipJeweler solves?
    - Purchase intent (30%): How likely is this person to adopt a software solution?
    - Influence score (20%): How many followers/karma/connections? Are they a community leader?
    - Recency (10%): How recent is the post?

    For each lead also:
    1. Assign an audience segment (Indie CAD Modeler, Etsy Seller, Brick-and-Mortar, Custom Jeweler, Manufacturer, Repair Shop)
    2. Estimate a dollar value based on segment LTV and purchase likelihood
    3. Determine which ZipJeweler features are most relevant to their pain point
    4. Flag any leads with score >= 70 as high-priority for engagement

    {user_direction}
  expected_output: >
    A scored and classified list of leads with: platform, URL, author,
    topic category, audience segment, lead score (0-100), dollar value,
    relevant ZipJeweler features, and priority flag.
  agent: lead_qualifier
