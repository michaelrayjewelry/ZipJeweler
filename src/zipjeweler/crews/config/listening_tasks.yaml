search_reddit:
  description: >
    Search the following subreddits for posts matching our listening topics:
    {subreddits}

    Search for ALL of these topic categories:
    1. CAD Modelers — people posting 3D jewelry models or renders
    2. Jewelry Designers — designers posting renderings and portfolios
    3. Custom Jewelry Questions — people asking about custom jewelry creation
    4. Jewelry Production — comments about production issues and workflow
    5. Casting Issues — jewelers with casting problems
    6. Looking for CAD — people searching for CAD services/software
    7. Looking for Designers — people searching for jewelry designers
    8. Looking for Manufacturers — people searching for manufacturers
    9. Business Management Pain — inventory, orders, CRM, pricing issues

    Use the configured keywords for each category.
    Return the most relevant posts from the last 24 hours.

    {user_direction}
  expected_output: >
    A list of discovered posts with: subreddit, post URL, author, title,
    content snippet, topic category, and initial relevance assessment.
  agent: reddit_listener

